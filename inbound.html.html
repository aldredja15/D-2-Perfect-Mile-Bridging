<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inbound Scan Compliance - D2 Perfect Mile Bridging</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 32px;
      color: white;
    }

    .page-header h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .page-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 24px;
      transition: background 0.2s;
    }

    .back-btn:hover { background: rgba(255,255,255,0.18); }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px 40px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .card-title .icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #FFB000, #FFA500);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 15px rgba(255,176,0,0.4);
    }

    .card-title h2 {
      font-size: 20px;
      font-weight: 800;
      color: #1e293b;
    }

    .card-title p {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-group input[type="number"],
    .form-group input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      color: #1e293b;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus {
      border-color: #FFB000;
      box-shadow: 0 0 0 3px rgba(255,176,0,0.15);
      background: white;
    }

    .upload-area {
      border: 2px dashed #e2e8f0;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8fafc;
      position: relative;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: #FFB000;
      background: #FFFBF0;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon { font-size: 36px; margin-bottom: 10px; }

    .upload-area h3 {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .upload-area p {
      font-size: 13px;
      color: #94a3b8;
    }

    .file-selected {
      margin-top: 10px;
      font-size: 13px;
      color: #16a34a;
      font-weight: 600;
    }

    .analyse-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FFB000, #FFA500);
      color: white;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(255,176,0,0.35);
    }

    .analyse-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,176,0,0.45);
    }

    .analyse-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    /* OUTPUT SECTION */
    .output-section {
      width: 100%;
      max-width: 860px;
      margin-top: 32px;
      display: none;
    }

    .output-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
    }

    .tab-btn {
      padding: 10px 22px;
      border-radius: 10px 10px 0 0;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
    }

    .tab-btn.active {
      background: white;
      color: #1e293b;
    }

    .tab-content {
      background: white;
      border-radius: 0 16px 16px 16px;
      padding: 32px;
      display: none;
    }

    .tab-content.active { display: block; }

    /* Plain text output */
    .plain-text-output {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      color: #1e293b;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1e293b;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 14px;
      transition: background 0.2s;
    }

    .copy-btn:hover { background: #334155; }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #FFB000, #FFA500);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 14px;
      margin-left: 8px;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(255,176,0,0.3);
    }

    .download-btn:hover { transform: translateY(-1px); }

    /* HTML Report Preview */
    .report-preview {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 700px;
      border: none;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Back to Homepage</a>

  <div class="page-header">
    <h1>🟡 Inbound Scan Compliance</h1>
    <p>Upload your ACES CSV export to generate your compliance bridge report</p>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="icon">📦</div>
      <div>
        <h2>Inbound Scan Compliance Flow</h2>
        <p>Automated analysis of IB container scan failures</p>
      </div>
    </div>

    <div class="form-group">
      <label>Compliance Percentage (%)</label>
      <input type="number" id="complianceInput" placeholder="e.g. 96.84" min="0" max="100" step="0.01"/>
    </div>

    <div class="form-group">
      <label>Report Date</label>
      <input type="text" id="reportDate" placeholder="e.g. April 18, 2026"/>
    </div>

    <div class="form-group">
      <label>Upload ACES CSV File</label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="csvFile" accept=".csv"/>
        <div class="upload-icon">📂</div>
        <h3>Drop your CSV file here</h3>
        <p>or click to browse</p>
        <div class="file-selected" id="fileSelectedMsg"></div>
      </div>
    </div>

    <button class="analyse-btn" id="analyseBtn" onclick="runAnalysis()">
      🔍 Analyse &amp; Generate Report
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="output-section" id="outputSection">
    <div class="output-tabs">
      <button class="tab-btn active" onclick="switchTab('plaintext')">📄 Plain Text Report</button>
      <button class="tab-btn" onclick="switchTab('html')">🎨 HTML Report</button>
    </div>
    <div class="tab-content active" id="tab-plaintext">
      <button class="copy-btn" onclick="copyPlainText()">📋 Copy to Clipboard</button>
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="plain-text-output" id="plainTextOutput"></div>
    </div>
    <div class="tab-content" id="tab-html">
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="report-preview">
        <iframe id="htmlPreview"></iframe>
      </div>
    </div>
  </div>

  <script>
    let parsedCSV = [];
    let generatedHTML = '';

    // File upload handling
    const csvFile = document.getElementById('csvFile');
    const uploadArea = document.getElementById('uploadArea');
    const fileMsg = document.getElementById('fileSelectedMsg');

    csvFile.addEventListener('change', function() {
      if (this.files[0]) {
        fileMsg.textContent = '✅ ' + this.files[0].name + ' selected';
      }
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) {
        csvFile.files = e.dataTransfer.files;
        fileMsg.textContent = '✅ ' + file.name + ' selected';
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    function parseCSV(text) {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        if (vals.length < 2) continue;
        const row = {};
        headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
        rows.push(row);
      }
      return rows;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result;
    }

    function getCol(row, colLetter) {
      // Map column letters to index (A=0, B=1 ... F=5, G=6, J=9, K=10, N=13, Q=16)
      const map = { f: 5, g: 6, j: 9, k: 10, n: 13, q: 16 };
      const idx = map[colLetter.toLowerCase()];
      const keys = Object.keys(row);
      if (keys[idx] !== undefined) return row[keys[idx]] || '';
      return '';
    }

    function runAnalysis() {
      hideError();

      const complianceVal = parseFloat(document.getElementById('complianceInput').value);
      const reportDate = document.getElementById('reportDate').value.trim() || new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'});
      const file = csvFile.files[0];

      if (isNaN(complianceVal)) { showError('Please enter a compliance percentage.'); return; }
      if (!file) { showError('Please upload a CSV file.'); return; }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const allRows = parseCSV(e.target.result);

          // Filter: ib_process (col L, index 11) = 'NOT_SCANNED'
          const rows = allRows.filter(row => {
            const keys = Object.keys(row);
            const ibProcess = row[keys[11]] || '';
            return ibProcess.trim().toUpperCase() === 'NOT_SCANNED';
          });

          if (rows.length === 0) {
            showError('No NOT_SCANNED records found. Please check your CSV file and ensure it is the correct ACES export.');
            return;
          }

          // Extract columns by index
          const getByIdx = (row, idx) => {
            const keys = Object.keys(row);
            return (row[keys[idx]] || '').trim();
          };

          // col F=5 container_id, G=6 container_label, J=9 ib_node, K=10 ib_node_type, N=13 ib_vrid, Q=16 unit_count
          const getData = (row) => ({
            container_id:    getByIdx(row, 5),
            container_label: getByIdx(row, 6),
            ib_node:         getByIdx(row, 9),
            ib_node_type:    getByIdx(row, 10),
            ib_vrid:         getByIdx(row, 13),
            unit_count:      parseFloat(getByIdx(row, 16)) || 0
          });

          const data = rows.map(getData);

          // ANALYSIS 1 - FC vs SC
          const uniqueByContainerId = {};
          data.forEach(r => {
            if (!uniqueByContainerId[r.container_id]) uniqueByContainerId[r.container_id] = r;
          });
          const uniqueContainers = Object.values(uniqueByContainerId);
          const totalUnique = uniqueContainers.length;

          const fcCount = uniqueContainers.filter(r => r.ib_node_type.toUpperCase() === 'FC').length;
          const scCount = uniqueContainers.filter(r => r.ib_node_type.toUpperCase() === 'SC').length;
          const fcPct = totalUnique > 0 ? ((fcCount / totalUnique) * 100).toFixed(1) : '0.0';
          const scPct = totalUnique > 0 ? ((scCount / totalUnique) * 100).toFixed(1) : '0.0';

          const analysis1 = `When looking at the inbound node types, ${fcPct}% of failures are from FCs, ${scPct}% are from SCs.`;

          // ANALYSIS 2 - Top 3 Failing Nodes
          const nodeMap = {};
          data.forEach(r => {
            if (!nodeMap[r.ib_node]) nodeMap[r.ib_node] = { containers: new Set(), labels: new Set() };
            nodeMap[r.ib_node].containers.add(r.container_id);
            nodeMap[r.ib_node].labels.add(r.container_label);
          });

          const nodeRanked = Object.entries(nodeMap)
            .map(([node, v]) => ({ node, count: v.containers.size, labels: [...v.labels] }))
            .sort((a, b) => b.count - a.count)
            .slice(0, 3);

          const rankEmoji = ['🔴', '🟠', '🟡'];
          const rankLabel = ['first', 'second', 'third'];
          let analysis2Lines = [];
          nodeRanked.forEach((n, i) => {
            const pct = totalUnique > 0 ? ((n.count / totalUnique) * 100).toFixed(1) : '0.0';
            analysis2Lines.push(`The top${i > 0 ? ' ' + rankLabel[i] : ''} inbound node which failed to receive an inbound scan was '${n.node}', with ${n.count} container${n.count !== 1 ? 's' : ''} (labels: ${n.labels.join(', ')}), contributing ${pct}% of total failures.`);
          });
          const analysis2 = analysis2Lines.join('\n');

          // ANALYSIS 3 - Top Failing VRID
          const vridMap = {};
          data.forEach(r => {
            if (!r.ib_vrid || r.ib_vrid === '') return;
            if (!vridMap[r.ib_vrid]) vridMap[r.ib_vrid] = { containers: new Set(), labels: new Set(), nodes: new Set(), units: 0 };
            vridMap[r.ib_vrid].containers.add(r.container_id);
            // Filter out DDMS labels
            if (!r.container_label.toUpperCase().includes('DDMS')) {
              vridMap[r.ib_vrid].labels.add(r.container_label);
            }
            vridMap[r.ib_vrid].nodes.add(r.ib_node);
            vridMap[r.ib_vrid].units += r.unit_count;
          });

          const vridRanked = Object.entries(vridMap)
            .map(([vrid, v]) => ({ vrid, count: v.containers.size, labels: [...v.labels], nodes: [...v.nodes], units: v.units }))
            .sort((a, b) => b.count - a.count || b.units - a.units);

          let analysis3 = 'No VRID data found.';
          let topVrid = null;
          if (vridRanked.length > 0) {
            topVrid = vridRanked[0];
            const filteredLabels = topVrid.labels.filter(l => !l.toUpperCase().includes('DDMS'));
            analysis3 = `The inbound VRID with the most amount of failures was '${topVrid.vrid}', arriving from '${topVrid.nodes[0]}' with ${topVrid.count} container${topVrid.count !== 1 ? 's' : ''} (labels: ${filteredLabels.join(', ')}).`;
          }

          // STATUS
          const isGreen = complianceVal >= 96;
          const statusText = isGreen ? `GREEN 🟢` : `RED 🔴`;

          // ANALYSIS 4 - Root Causes
          const rootCauses = [
            `FC vs SC Distribution: FCs contribute ${fcPct}% of failures${fcCount > scCount ? ', indicating a higher failure rate at fulfillment centers compared to sortation centers' : ' and SCs contribute ' + scPct + '%, indicating a fairly even distribution of failures across node types'}.`,
            `${nodeRanked[0] ? nodeRanked[0].node : 'Top'} Node: ${nodeRanked[0] ? `${nodeRanked[0].node}${nodeRanked.length > 1 && nodeRanked[0].count === nodeRanked[1].count ? ' and ' + nodeRanked[1].node + ' are tied as the top failing nodes' : ' is the top failing node'} with ${nodeRanked[0].count} container${nodeRanked[0].count !== 1 ? 's' : ''} (${totalUnique > 0 ? ((nodeRanked[0].count / totalUnique) * 100).toFixed(1) : 0}% contribution), suggesting systematic scanning issues at this facility.` : 'No node data available.'}`,
            topVrid ? `VRID ${topVrid.vrid}: This VRID from ${topVrid.nodes[0]} has the highest failure count with ${topVrid.count} container${topVrid.count !== 1 ? 's' : ''}, indicating potential route-specific or vehicle-specific scanning problems.` : 'No VRID data available.'
          ];

          // ANALYSIS 5 - Corrective Actions
          const correctiveActions = [
            `FC Locations: ${fcCount > scCount ? 'Implement targeted training and process audits at FC locations to address the higher failure rate, focusing on scanner availability and associate compliance.' : 'Monitor both FC and SC locations equally, ensuring scanner availability and associate compliance training is consistent across all node types.'}`,
            nodeRanked[0] ? `${nodeRanked[0].node} Facility: Deploy immediate intervention at ${nodeRanked[0].node}${nodeRanked.length > 1 && nodeRanked[0].count === nodeRanked[1].count ? ' and ' + nodeRanked[1].node : ''}, including equipment checks, workflow reviews, and associate retraining on inbound scanning procedures.` : 'Review all facility scanning procedures.',
            topVrid ? `VRID ${topVrid.vrid}: Investigate VRID ${topVrid.vrid} operations from ${topVrid.nodes[0]}, including driver compliance, scanner functionality on that route, and timing of arrivals to identify root causes.` : 'Review VRID operations for all failing routes.'
          ];

          // =====================
          // OUTPUT 1 - PLAIN TEXT
          // =====================
          const plainText = `IB Scan Compliance
The Container Unloading Process is said to be compliant if the palletized IB container receives a Scan at the general area
Targets: Red: <96% Green: 96%-100%

**COMPLIANCE STATUS: ${complianceVal}% - ${statusText}**

Exceptions:
- BAGS are excluded
- XDOCK containers are excluded
- Only FC and SC IB containers are considered
Source - w.amazon.com/bin/view/ATSEU/NMT/DnA/Products/ACES-Process-Compliance-Data/

Inbound Node Type
${analysis1}

Inbound Node
${analysis2}

Inbound VRID
${analysis3}

Root Causes
${rootCauses.map((r, i) => `${i + 1}. ${r}`).join('\n')}

Corrective Actions
${correctiveActions.map((r, i) => `${i + 1}. ${r}`).join('\n')}`;

          document.getElementById('plainTextOutput').textContent = plainText;

          // =====================
          // OUTPUT 2 - HTML REPORT
          // =====================
          const statusBg = isGreen ? '#E5FFE5' : '#FFE5E5';
          const statusColor = isGreen ? '#166534' : '#991b1b';

          const nodeTableRows = nodeRanked.map((n, i) => {
            const pct = totalUnique > 0 ? ((n.count / totalUnique) * 100).toFixed(1) : '0.0';
            const bg = i % 2 === 0 ? '#ffffff' : '#FFF9E6';
            return `<tr style="background:${bg}">
              <td style="padding:10px 14px;font-weight:700">${rankEmoji[i]} #${i + 1}</td>
              <td style="padding:10px 14px;font-weight:700">${n.node}</td>
              <td style="padding:10px 14px;text-align:center">${n.count}</td>
              <td style="padding:10px 14px;font-size:12px;color:#64748b">${n.labels.join(', ')}</td>
              <td style="padding:10px 14px;text-align:center;font-weight:700">${pct}%</td>
            </tr>`;
          }).join('');

          generatedHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>IB Scan Compliance Report - ${reportDate}</title>
</head>
<body style="margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5;">

  <div style="background:#FFB000;padding:28px 40px;text-align:center;">
    <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:800;letter-spacing:-0.3px;">IB Scan Compliance Report</h1>
    <p style="margin:8px 0 0;color:rgba(255,255,255,0.85);font-size:14px;">Report Date: ${reportDate} &nbsp;|&nbsp; Target: Red &lt;96% &nbsp;|&nbsp; Green 96%-100%</p>
  </div>

  <div style="max-width:860px;margin:0 auto;padding:32px 20px;">

    <div style="background:${statusBg};border-radius:16px;padding:28px;text-align:center;margin-bottom:28px;border:2px solid ${isGreen ? '#86efac' : '#fca5a5'};">
      <div style="font-size:36px;font-weight:900;color:${statusColor};">${complianceVal}% - ${statusText}</div>
    </div>

    <div style="background:#FFF4CC;border-left:4px solid #FFB000;border-radius:12px;padding:22px 26px;margin-bottom:28px;">
      <h2 style="color:#92400e;font-size:16px;margin:0 0 10px;">Executive Summary</h2>
      <p style="color:#78350f;font-size:14px;line-height:1.7;margin:0 0 8px;">The Container Unloading Process is said to be compliant if the palletized IB container receives a scan at the general area. This report analyzes inbound scan compliance failures for NOT_SCANNED containers.</p>
      <p style="color:#78350f;font-size:13px;margin:0;"><strong>Exceptions:</strong> BAGS are excluded &bull; XDOCK containers are excluded &bull; Only FC and SC IB containers are considered</p>
      <p style="color:#78350f;font-size:13px;margin:8px 0 0;"><strong>Source:</strong> w.amazon.com/bin/view/ATSEU/NMT/DnA/Products/ACES-Process-Compliance-Data/</p>
    </div>

        } catch(err) {

        }

      reader.readAsText(file);
    }

    function copyPlainText() {
      const text = document.getElementById('plainTextOutput').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 2000);
      });
    }

    function downloadHTML() {
      if (!generatedHTML) return;
      const blob = new Blob([generatedHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'IB_Scan_Compliance_Report.html';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
