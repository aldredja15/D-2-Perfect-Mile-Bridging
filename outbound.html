<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outbound Scan Compliance - D2 Perfect Mile Bridging</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px;
    }

    .page-header { text-align: center; margin-bottom: 32px; color: white; }
    .page-header h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: rgba(255,255,255,0.55); }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); color: white;
      border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px;
      border-radius: 8px; font-size: 13px; cursor: pointer;
      text-decoration: none; margin-bottom: 24px; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.18); }

    .card {
      background: white; border-radius: 20px; padding: 36px 40px;
      width: 100%; max-width: 680px; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .card-title { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .card-title .icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px;
      box-shadow: 0 4px 15px rgba(13,148,136,0.4);
    }
    .card-title h2 { font-size: 20px; font-weight: 800; color: #1e293b; }
    .card-title p { font-size: 13px; color: #94a3b8; margin-top: 2px; }

    .form-group { margin-bottom: 22px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-group input[type="number"],
    .form-group input[type="text"] {
      width: 100%; padding: 12px 16px;
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 14px; color: #1e293b;
      outline: none; transition: all 0.2s;
    }
    .form-group input:focus {
      border-color: #0D9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
      background: white;
    }

    .upload-area {
      border: 2px dashed #e2e8f0; border-radius: 12px; padding: 32px;
      text-align: center; cursor: pointer; transition: all 0.2s;
      background: #f8fafc; position: relative;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #0D9488; background: #F0FDFA; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-area h3 { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .upload-area p { font-size: 13px; color: #94a3b8; }
    .file-selected { margin-top: 10px; font-size: 13px; color: #16a34a; font-weight: 600; }

    .analyse-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      color: white; font-size: 15px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      letter-spacing: 0.5px; margin-top: 8px; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(13,148,136,0.35);
    }
    .analyse-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,148,136,0.45); }
    .analyse-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      border-radius: 10px; padding: 12px 16px; font-size: 13px;
      margin-top: 16px; display: none;
    }

    .output-section { width: 100%; max-width: 960px; margin-top: 32px; display: none; }
    .output-tabs { display: flex; gap: 8px; }
    .tab-btn {
      padding: 10px 22px; border-radius: 10px 10px 0 0;
      border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6);
    }
    .tab-btn.active { background: white; color: #1e293b; }
    .tab-content { background: white; border-radius: 0 16px 16px 16px; padding: 32px; display: none; }
    .tab-content.active { display: block; }

    .plain-text-output {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 20px; font-family: 'Courier New', monospace; font-size: 13px;
      line-height: 1.8; color: #1e293b; white-space: pre-wrap; word-break: break-word;
    }

    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e293b; color: white; border: none;
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-bottom: 14px; transition: background 0.2s;
    }
    .copy-btn:hover { background: #334155; }

    .download-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      color: white; border: none; padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-bottom: 14px; margin-left: 8px; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(13,148,136,0.3);
    }
    .download-btn:hover { transform: translateY(-1px); }
    .report-preview { border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    iframe { width: 100%; height: 800px; border: none; }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Back to Homepage</a>

  <div class="page-header">
    <h1>🔵 Outbound Scan Compliance</h1>
    <p>Upload your OB Scan Compliance CSV export to generate your compliance bridge report</p>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="icon">🚚</div>
      <div>
        <h2>Outbound Scan Compliance Flow</h2>
        <p>Automated analysis of XD and Sort failures, SWA vs AFN misses</p>
      </div>
    </div>

    <div class="form-group">
      <label>Compliance Percentage (%)</label>
      <input type="number" id="complianceInput" placeholder="e.g. 99.16" min="0" max="100" step="0.01"/>
    </div>

    <div class="form-group">
      <label>Report Date</label>
      <input type="text" id="reportDate" placeholder="e.g. April 18, 2026"/>
    </div>

    <div class="form-group">
      <label>Upload OB Scan Compliance CSV File</label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="csvFile" accept=".csv"/>
        <div class="upload-icon">📂</div>
        <h3>Drop your CSV file here</h3>
        <p>or click to browse</p>
        <div class="file-selected" id="fileSelectedMsg"></div>
      </div>
    </div>

    <button class="analyse-btn" onclick="runAnalysis()">🔍 Analyse &amp; Generate Report</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="output-section" id="outputSection">
    <div class="output-tabs">
      <button class="tab-btn active" onclick="switchTab('plaintext', event)">📄 Plain Text Report</button>
      <button class="tab-btn" onclick="switchTab('html', event)">🎨 HTML Report</button>
    </div>
    <div class="tab-content active" id="tab-plaintext">
      <button class="copy-btn" onclick="copyPlainText()">📋 Copy to Clipboard</button>
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="plain-text-output" id="plainTextOutput"></div>
    </div>
    <div class="tab-content" id="tab-html">
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="report-preview"><iframe id="htmlPreview"></iframe></div>
    </div>
  </div>

  <script>
    let generatedHTML = '';

    const csvFile = document.getElementById('csvFile');
    const uploadArea = document.getElementById('uploadArea');
    const fileMsg = document.getElementById('fileSelectedMsg');

    csvFile.addEventListener('change', function() {
      if (this.files[0]) fileMsg.textContent = '✅ ' + this.files[0].name + ' selected';
    });

    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault(); uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) {
        csvFile.files = e.dataTransfer.files;
        fileMsg.textContent = '✅ ' + file.name + ' selected';
      }
    });

    function switchTab(tab, event) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (event && event.target) event.target.classList.add('active');
    }

    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
    function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

    function parseCSVLine(line) {
      const result = []; let current = ''; let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
        else { current += ch; }
      }
      result.push(current); return result;
    }

    function parseCSV(text) {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) return { headers: [], rows: [] };
      const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, ''));
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        if (vals.length < 2) continue;
        const row = {};
        headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
        rows.push(row);
      }
      return { headers, rows };
    }

    // Find best matching column name from the parsed headers
    function findCol(headers, candidates) {
      for (const c of candidates) {
        const clean = c.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        const found = headers.find(h => h === clean || h.includes(clean) || clean.includes(h));
        if (found) return found;
      }
      return null;
    }

    function colVal(row, colName) {
      if (!colName) return '';
      return (row[colName] || '').trim();
    }

    function isBlank(val) {
      return !val || val.trim() === '' || val.trim().toLowerCase() === 'null' || val.trim() === '-';
    }

    function runAnalysis() {
      hideError();
      const complianceVal = parseFloat(document.getElementById('complianceInput').value);
      const reportDate = document.getElementById('reportDate').value.trim() || new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'});
      const file = csvFile.files[0];

      if (isNaN(complianceVal)) { showError('Please enter a compliance percentage.'); return; }
      if (!file) { showError('Please upload a CSV file.'); return; }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const { headers, rows } = parseCSV(e.target.result);
          if (rows.length === 0) { showError('No data found in CSV file.'); return; }

          // ── Column mapping using exact column names from the OB dashboard ──
          const scanLogicCol      = findCol(headers, ['scan_logic_detail', 'scan_logic', 'bucket', 'failure_bucket']);
          const ibContainerCol    = findCol(headers, ['ib_container_label', 'ib_container', 'container_label', 'container_id']);
          const stackDestCol      = findCol(headers, ['stack_dest_container', 'stack_dest', 'dest_container', 'belt_container']);
          const nextNodeCol       = findCol(headers, ['next_node', 'destination', 'dest_node', 'next_destination']);
          const ibSspLaneCol      = findCol(headers, ['ib_ssp_lane', 'ib_ssp', 'origin', 'origin_node', 'ib_node', 'source_node']);
          const shipmentCol       = findCol(headers, ['shipment_id', 'shipment', 'tracking_id', 'package_id', 'parcel_id']);
          const sortationTypeCol  = findCol(headers, ['sortation_type', 'sort_type', 'swa_afn', 'network_type', 'fulfillment_type']);
          const autosorterCol     = findCol(headers, ['autosorter_last_chute', 'autosorter', 'adta', 'last_chute', 'shipping_sorter']);
          const sizeCol           = findCol(headers, ['package_size', 'size', 'pkg_size', 'tote_size', 'item_size']);

          const total = rows.length;

          // ── ANALYSIS 1: SWA vs AFN ──
          let swaCount = 0, afnCount = 0;
          rows.forEach(row => {
            const val = colVal(row, sortationTypeCol).toUpperCase();
            if (val.includes('SWA')) swaCount++;
            else if (val.includes('AFN')) afnCount++;
          });
          const swaAfnTotal = swaCount + afnCount || total;
          const swaPct = ((swaCount / swaAfnTotal) * 100).toFixed(1);
          const afnPct = ((afnCount / swaAfnTotal) * 100).toFixed(1);
          const analysis1 = `Focusing on sortation misses, ${swaCount} shipments were SWA and ${afnCount} shipments were AFN. SWA contributed ${swaPct}% while AFN contributed ${afnPct}% to the total sortation misses.`;

          // ── ANALYSIS 2: Top 3 XD Missed Container Scans ──
          // Use ib_container_label where scan_logic_detail contains 'XDOCK'
          // Destination from next_node, Origin from ib_ssp_lane
          // Count unique shipments per ib_container_label
          const xdRows = rows.filter(row => {
            const logic = colVal(row, scanLogicCol).toUpperCase();
            return logic.includes('XDOCK') || logic.includes('XD');
          });

          const xdContainerMap = {};
          xdRows.forEach(row => {
            const container = colVal(row, ibContainerCol) || 'UNKNOWN';
            const origin    = colVal(row, ibSspLaneCol)   || 'Unknown';
            const dest      = colVal(row, nextNodeCol)    || 'Unknown';
            const shipment  = colVal(row, shipmentCol)    || '';

            if (!xdContainerMap[container]) {
              xdContainerMap[container] = { shipments: new Set(), origins: new Set(), dests: new Set() };
            }
            if (shipment) xdContainerMap[container].shipments.add(shipment);
            else xdContainerMap[container].shipments.add(Math.random()); // fallback count row
            if (!isBlank(origin)) xdContainerMap[container].origins.add(origin);
            if (!isBlank(dest))   xdContainerMap[container].dests.add(dest);
          });

          const xdRanked = Object.entries(xdContainerMap)
            .map(([c, v]) => ({ container: c, count: v.shipments.size, origin: [...v.origins][0] || 'Unknown', dest: [...v.dests][0] || 'Unknown' }))
            .sort((a, b) => b.count - a.count)
            .slice(0, 3);

          const rankOrdinal = ['most impacting', 'second most impacting', 'third most impacting'];
          const analysis2 = xdRanked.length > 0
            ? xdRanked.map((c, i) => {
                const pct = total > 0 ? ((c.count / total) * 100).toFixed(1) : '0.0';
                return `Focusing on XD missed container scans, the ${rankOrdinal[i]} container was '${c.container}' with ${c.count} shipments, contributing towards ${pct}% of total OB scan misses. This container arrived from '${c.origin}' and was sent to '${c.dest}'.`;
              }).join('\n')
            : 'No XD failure data found.';

          // ── ANALYSIS 3: Top 3 Sort Failure Buckets ──
          // Count unique shipments per scan_logic_detail bucket
          const bucketShipmentMap = {};
          rows.forEach(row => {
            const bucket   = colVal(row, scanLogicCol) || 'UNKNOWN';
            const shipment = colVal(row, shipmentCol)  || '';
            if (!bucketShipmentMap[bucket]) bucketShipmentMap[bucket] = new Set();
            if (shipment) bucketShipmentMap[bucket].add(shipment);
            else bucketShipmentMap[bucket].add(Math.random());
          });

          const bucketRanked = Object.entries(bucketShipmentMap)
            .map(([b, s]) => ({ bucket: b, count: s.size }))
            .sort((a, b) => b.count - a.count)
            .slice(0, 3);

          const rankLabels3 = ['top', 'second', 'third'];
          const analysis3 = bucketRanked.length > 0
            ? bucketRanked.map((b, i) => {
                const pct = total > 0 ? ((b.count / total) * 100).toFixed(1) : '0.0';
                return `The ${rankLabels3[i]} failed bucket for OB scan was '${b.bucket}' with ${b.count} shipments, contributing towards ${pct}% of total failures.`;
              }).join('\n')
            : 'No bucket data found.';

          // ── ANALYSIS 4: Top 3 Containers Created by Belts ──
          // Use stack_dest_container as the container identifier
          // Destination from next_node, count unique shipments
          const beltRows = rows.filter(row => !isBlank(colVal(row, stackDestCol)));

          const beltContainerMap = {};
          beltRows.forEach(row => {
            const container = colVal(row, stackDestCol) || 'UNKNOWN';
            const dest      = colVal(row, nextNodeCol)  || 'Unknown';
            const shipment  = colVal(row, shipmentCol)  || '';
            if (!beltContainerMap[container]) beltContainerMap[container] = { shipments: new Set(), dests: new Set() };
            if (shipment) beltContainerMap[container].shipments.add(shipment);
            else beltContainerMap[container].shipments.add(Math.random());
            if (!isBlank(dest)) beltContainerMap[container].dests.add(dest);
          });

          const beltRanked = Object.entries(beltContainerMap)
            .map(([c, v]) => ({ container: c, count: v.shipments.size, dest: [...v.dests][0] || 'Unknown' }))
            .sort((a, b) => b.count - a.count)
            .slice(0, 3);

          const analysis4 = beltRanked.length > 0
            ? beltRanked.map((c, i) => {
                const pct = total > 0 ? ((c.count / total) * 100).toFixed(1) : '0.0';
                return `Looking into containers that were created by the belts on site, the ${rankLabels3[i]} container was '${c.container}' destined for '${c.dest}' - ${pct}% of total OB scan misses.`;
              }).join('\n')
            : 'No belt container data found.';

          // ── ANALYSIS 5: Shipment Level Misses ──
          // Package level sort misses: rows where stack_dest_container is blank
          // Destination from next_node
          const sortMissRows = rows.filter(row => {
            const logic = colVal(row, scanLogicCol).toUpperCase();
            return (logic.includes('SORT') || logic.includes('STACK')) && isBlank(colVal(row, stackDestCol));
          });

          const laneShipmentMap = {};
          sortMissRows.forEach(row => {
            const dest     = colVal(row, nextNodeCol) || 'Unknown';
            const shipment = colVal(row, shipmentCol) || '';
            if (!laneShipmentMap[dest]) laneShipmentMap[dest] = new Set();
            if (shipment) laneShipmentMap[dest].add(shipment);
            else laneShipmentMap[dest].add(Math.random());
          });

          const topLane = Object.entries(laneShipmentMap)
            .map(([d, s]) => ({ dest: d, count: s.size }))
            .sort((a, b) => b.count - a.count)[0];

          const analysis5 = `Focusing on shipment level misses, the total was ${sortMissRows.length}. Of which, the most impacted outbound lane was '${topLane ? topLane.dest : 'Unknown'}' with ${topLane ? topLane.count : 0} shipments.`;

          // ── ANALYSIS 6: ADTA Belt ──
          const adtaRows = rows.filter(row => !isBlank(colVal(row, autosorterCol)));
          const adtaCount = adtaRows.length;
          const adtaPct   = total > 0 ? ((adtaCount / total) * 100).toFixed(1) : '0.0';
          const analysis6 = `Of all OB scan misses, ${adtaCount} packages were processed through the ADTA belt (Shipping Sorter), contributing towards ${adtaPct}% of total OB scan misses.`;

          // ── ANALYSIS 7: Stack Scan Misses by Package Size ──
          const sizeMap = {};
          rows.forEach(row => {
            const logic = colVal(row, scanLogicCol).toUpperCase();
            if (logic.includes('STACK')) {
              const size = colVal(row, sizeCol) || 'Unknown';
              if (!sizeMap[size]) sizeMap[size] = new Set();
              const shipment = colVal(row, shipmentCol) || '';
              if (shipment) sizeMap[size].add(shipment);
              else sizeMap[size].add(Math.random());
            }
          });

          const sizeOrder = ['extra small','xs','small','s','medium','m','large','l','extra large','xl','nc plus','nc'];
          const sizeRanked = Object.entries(sizeMap)
            .map(([s, v]) => ({ size: s, count: v.size }))
            .sort((a, b) => {
              const ai = sizeOrder.indexOf(a.size.toLowerCase());
              const bi = sizeOrder.indexOf(b.size.toLowerCase());
              return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
            });

          const analysis7 = sizeRanked.length > 0
            ? sizeRanked.map(s => `Of all the shipments missing stack scan, ${s.count} were '${s.size}'.`).join('\n')
            : 'No stack scan size data found.';

          // ── Root Causes ──
          const rootCauses = [
            `SWA vs AFN Pattern: The vast majority of sortation misses (${afnPct}%) originate from AFN nodes, suggesting AFN inbound container management is the primary driver of sort failures. SWA nodes contribute a smaller but notable ${swaPct}%, indicating room for improvement across both network types.`,
            xdRanked.length > 0 ? `Top XD Failures: ${xdRanked[0].container} alone accounts for ${total > 0 ? ((xdRanked[0].count / total) * 100).toFixed(1) : 0}% of all OB scan misses, indicating a systemic departure scanning issue at ${xdRanked[0].origin}. The concentration of XD failures on specific lanes suggests a lane-specific process breakdown.` : 'No XD failure data available.',
            bucketRanked.length > 0 ? `Top Sort Failure Buckets: ${bucketRanked[0].bucket} is the dominant failure bucket at ${total > 0 ? ((bucketRanked[0].count / total) * 100).toFixed(1) : 0}% of failures, indicating systemic issues with the scanning process that require immediate operational attention.` : 'No bucket data available.'
          ];

          // ── Corrective Actions ──
          const correctiveActions = [
            `SWA/AFN Actions: Implement targeted process audits at AFN origin nodes to address the disproportionate ${afnPct}% contribution to sortation misses. Coordinate with FC operations teams to improve container departure scanning compliance before dispatch to SXW2.`,
            xdRanked.length > 0 ? `XD Improvements: Deploy immediate investigation into ${xdRanked[0].container} arriving from ${xdRanked[0].origin}, including equipment checks and departure scanning procedure reviews. Implement real-time alerts for containers with repeated scan failures on high-volume lanes.` : 'Review XD container departure procedures across all origin nodes.',
            `Sort Process Improvements: Conduct urgent process audit for ${bucketRanked.length > 0 ? bucketRanked[0].bucket : 'stack scan'} failures, ensuring all associates are trained on correct stacking scan procedures. Review ADTA belt operations and implement additional compliance checkpoints for packages processed through the Shipping Sorter.`
          ];

          const isGreen     = complianceVal >= 99.2;
          const statusText  = isGreen ? 'GREEN 🟢' : 'RED 🔴';
          const statusBg    = isGreen ? '#E5FFE5' : '#FFE5E5';
          const statusColor = isGreen ? '#166534' : '#991b1b';
          const rankEmoji   = ['🔴', '🟠', '🟡'];

          // ── OUTPUT 1: PLAIN TEXT ──
          const plainText = `Outbound Scan Compliance
XDOCK FAILURE (CURRENT NODE - UNTRACEABLE): The package has been departed as untraceable from the SC.
XDOCK FAILURE (CURRENT NODE - DEPART SCAN): The package arrived in a XDock container and this IB container has not been departed. The package has not been scanned at shipment-level, either.
XDOCK FAILURE (CURRENT NODE - BAG STACK SCAN): The package arrives to the site within a bag. However, the bag is not scanned to any container (pallet, cart, shuttle) and this prevents it from being correctly departed.
XDOCK FAILURE (CURRENT NODE - AUTODEPART): The package arrived in a XDock container and this IB container has not been departed. The package has not been scanned at shipment-level, either. The package has reached the next node, thus triggering auto-depart.
SORT FAILURE (CURRENT NODE - UNTRACEABLE): The package has been departed as untraceable from the SC.
