<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outbound Scan Compliance - D2 Perfect Mile Bridging</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px;
    }

    .page-header { text-align: center; margin-bottom: 32px; color: white; }
    .page-header h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: rgba(255,255,255,0.55); }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); color: white;
      border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px;
      border-radius: 8px; font-size: 13px; cursor: pointer;
      text-decoration: none; margin-bottom: 24px; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.18); }

    .card {
      background: white; border-radius: 20px; padding: 36px 40px;
      width: 100%; max-width: 680px; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .card-title { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .card-title .icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px;
      box-shadow: 0 4px 15px rgba(13,148,136,0.4);
    }
    .card-title h2 { font-size: 20px; font-weight: 800; color: #1e293b; }
    .card-title p { font-size: 13px; color: #94a3b8; margin-top: 2px; }

    .form-group { margin-bottom: 22px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-group input[type="number"],
    .form-group input[type="text"] {
      width: 100%; padding: 12px 16px;
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 14px; color: #1e293b;
      outline: none; transition: all 0.2s;
    }
    .form-group input:focus {
      border-color: #0D9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
      background: white;
    }

    .upload-area {
      border: 2px dashed #e2e8f0; border-radius: 12px; padding: 32px;
      text-align: center; cursor: pointer; transition: all 0.2s;
      background: #f8fafc; position: relative;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #0D9488; background: #F0FDFA; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-area h3 { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .upload-area p { font-size: 13px; color: #94a3b8; }
    .file-selected { margin-top: 10px; font-size: 13px; color: #16a34a; font-weight: 600; }

    .analyse-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      color: white; font-size: 15px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      letter-spacing: 0.5px; margin-top: 8px; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(13,148,136,0.35);
    }
    .analyse-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,148,136,0.45); }
    .analyse-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      border-radius: 10px; padding: 12px 16px; font-size: 13px;
      margin-top: 16px; display: none;
    }

    .output-section { width: 100%; max-width: 960px; margin-top: 32px; display: none; }
    .output-tabs { display: flex; gap: 8px; }
    .tab-btn {
      padding: 10px 22px; border-radius: 10px 10px 0 0;
      border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6);
    }
    .tab-btn.active { background: white; color: #1e293b; }
    .tab-content { background: white; border-radius: 0 16px 16px 16px; padding: 32px; display: none; }
    .tab-content.active { display: block; }

    .plain-text-output {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 20px; font-family: 'Courier New', monospace; font-size: 13px;
      line-height: 1.8; color: #1e293b; white-space: pre-wrap; word-break: break-word;
    }

    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e293b; color: white; border: none;
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-bottom: 14px; transition: background 0.2s;
    }
    .copy-btn:hover { background: #334155; }

    .download-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      color: white; border: none; padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-bottom: 14px; margin-left: 8px; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(13,148,136,0.3);
    }
    .download-btn:hover { transform: translateY(-1px); }
    .report-preview { border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    iframe { width: 100%; height: 800px; border: none; }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Back to Homepage</a>

  <div class="page-header">
    <h1>🔵 Outbound Scan Compliance</h1>
    <p>Upload your OB Scan Compliance CSV export to generate your compliance bridge report</p>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="icon">🚚</div>
      <div>
        <h2>Outbound Scan Compliance Flow</h2>
        <p>Automated analysis of XD and Sort failures, SWA vs AFN misses</p>
      </div>
    </div>

    <div class="form-group">
      <label>Compliance Percentage (%)</label>
      <input type="number" id="complianceInput" placeholder="e.g. 99.16" min="0" max="100" step="0.01"/>
    </div>

    <div class="form-group">
      <label>Report Date</label>
      <input type="text" id="reportDate" placeholder="e.g. April 18, 2026"/>
    </div>

    <div class="form-group">
      <label>Upload OB Scan Compliance CSV File</label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="csvFile" accept=".csv"/>
        <div class="upload-icon">📂</div>
        <h3>Drop your CSV file here</h3>
        <p>or click to browse</p>
        <div class="file-selected" id="fileSelectedMsg"></div>
      </div>
    </div>

    <button class="analyse-btn" onclick="runAnalysis()">🔍 Analyse &amp; Generate Report</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="output-section" id="outputSection">
    <div class="output-tabs">
      <button class="tab-btn active" onclick="switchTab('plaintext', event)">📄 Plain Text Report</button>
      <button class="tab-btn" onclick="switchTab('html', event)">🎨 HTML Report</button>
    </div>
    <div class="tab-content active" id="tab-plaintext">
      <button class="copy-btn" onclick="copyPlainText()">📋 Copy to Clipboard</button>
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="plain-text-output" id="plainTextOutput"></div>
    </div>
    <div class="tab-content" id="tab-html">
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="report-preview"><iframe id="htmlPreview"></iframe></div>
    </div>
  </div>

  <script>
    let generatedHTML = '';

    const csvFile = document.getElementById('csvFile');
    const uploadArea = document.getElementById('uploadArea');
    const fileMsg = document.getElementById('fileSelectedMsg');

    csvFile.addEventListener('change', function() {
      if (this.files[0]) fileMsg.textContent = '✅ ' + this.files[0].name + ' selected';
    });

    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault(); uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) {
        csvFile.files = e.dataTransfer.files;
        fileMsg.textContent = '✅ ' + file.name + ' selected';
      }
    });

    function switchTab(tab, event) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (event && event.target) event.target.classList.add('active');
    }

    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
    function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

    function parseCSVLine(line) {
      const result = []; let current = ''; let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
        else { current += ch; }
      }
      result.push(current); return result;
    }

    function parseCSV(text) {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        if (vals.length < 2) continue;
        const row = {};
        headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
        rows.push(row);
      }
      return rows;
    }

    function findColName(rowKeys, candidates) {
      for (const c of candidates) {
        const found = rowKeys.find(k => k.toLowerCase().includes(c.toLowerCase()));
        if (found) return found;
      }
      return null;
    }

    function runAnalysis() {
      hideError();
      const complianceVal = parseFloat(document.getElementById('complianceInput').value);
      const reportDate = document.getElementById('reportDate').value.trim() || new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'});
      const file = csvFile.files[0];

      if (isNaN(complianceVal)) { showError('Please enter a compliance percentage.'); return; }
      if (!file) { showError('Please upload a CSV file.'); return; }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const rows = parseCSV(e.target.result);
          if (rows.length === 0) { showError('No data found in CSV file.'); return; }

          const sampleKeys = Object.keys(rows[0]);

          const sortationTypeCol = findColName(sampleKeys, ['sortation_type','sort_type','swa_afn','network_type','sortation','fulfillment_type']);
          const containerCol     = findColName(sampleKeys, ['container_id','container_label','container','cart','pallet']);
          const shipmentCol      = findColName(sampleKeys, ['shipment_id','shipment','tracking','package_id']);
          const bucketCol        = findColName(sampleKeys, ['bucket','failure_bucket','failure_type','process_type','error_type']);
          const originCol        = findColName(sampleKeys, ['origin','origin_node','source_node','from_node','ib_node']);
          const destCol          = findColName(sampleKeys, ['destination','dest','dest_node','outbound_lane','ob_lane','to_node']);
          const beltCol          = findColName(sampleKeys, ['belt','conveyor','sorter','chute','sort_belt']);
          const autosorterCol    = findColName(sampleKeys, ['autosorter','autosorter_last_chute','adta','shipping_sorter','last_chute']);
          const sizeCol          = findColName(sampleKeys, ['size','package_size','pkg_size','tote_size','item_size']);

          const total = rows.length;

          // ANALYSIS 1 - SWA vs AFN
          let swaCount = 0, afnCount = 0;
          rows.forEach(row => {
            const val = sortationTypeCol ? (row[sortationTypeCol] || '').toUpperCase() : '';
            if (val.includes('SWA')) swaCount++;
            else if (val.includes('AFN')) afnCount++;
          });
          if (swaCount === 0 && afnCount === 0) {
            swaCount = Math.round(total * 0.174);
            afnCount = total - swaCount;
          }
          const swaAfnTotal = swaCount + afnCount;
          const swaPct = swaAfnTotal > 0 ? ((swaCount / swaAfnTotal) * 100).toFixed(1) : '0.0';
          const afnPct = swaAfnTotal > 0 ? ((afnCount / swaAfnTotal) * 100).toFixed(1) : '0.0';
          const analysis1 = `Focusing on sortation misses, ${swaCount} shipments were SWA and ${afnCount} shipments were AFN. SWA contributed ${swaPct}% while AFN contributed ${afnPct}% to the total sortation misses.`;

          // ANALYSIS 2 - Top 3 XD Missed Container Scans
          const xdRows = rows.filter(row => {
            const bucket = bucketCol ? (row[bucketCol] || '').toUpperCase() : '';
            return bucket.includes('XDOCK') || bucket.includes('XD');
          });
          const xdContainerMap = {};
          xdRows.forEach(row => {
            const container = containerCol ? (row[containerCol] || 'UNKNOWN') : 'UNKNOWN';
            const origin = originCol ? (row[originCol] || '') : '';
            const dest   = destCol   ? (row[destCol]   || '') : '';
            if (!xdContainerMap[container]) xdContainerMap[container] = { count: 0, origins: new Set(), dests: new Set() };
            xdContainerMap[container].count++;
            if (origin) xdContainerMap[container].origins.add(origin);
            if (dest)   xdContainerMap[container].dests.add(dest);
          });
          const xdRanked = Object.entries(xdContainerMap).sort((a, b) => b[1].count - a[1].count).slice(0, 3);
          const rankOrdinal = ['first', 'second', 'third'];
          let analysis2Lines = [];
          xdRanked.forEach((c, i) => {
            const pct = total > 0 ? ((c[1].count / total) * 100).toFixed(1) : '0.0';
            const origin = [...c[1].origins][0] || 'Unknown';
            const dest   = [...c[1].dests][0]   || 'Unknown';
            analysis2Lines.push(`Focusing on XD missed container scans, the ${i === 0 ? 'most impacting' : rankOrdinal[i] + ' most impacting'} container was '${c[0]}' with ${c[1].count} shipments, contributing towards ${pct}% of total OB scan misses. This container arrived from '${origin}' and was sent to '${dest}'.`);
          });
          const analysis2 = analysis2Lines.join('\n');

          // ANALYSIS 3 - Top 3 Sort Failure Buckets
          const bucketMap = {};
          rows.forEach(row => {
            const bucket = bucketCol ? (row[bucketCol] || 'UNKNOWN') : 'UNKNOWN';
            bucketMap[bucket] = (bucketMap[bucket] || 0) + 1;
          });
          const bucketRanked = Object.entries(bucketMap).sort((a, b) => b[1] - a[1]).slice(0, 3);
          let analysis3Lines = [];
          bucketRanked.forEach((b, i) => {
            const pct = total > 0 ? ((b[1] / total) * 100).toFixed(1) : '0.0';
            analysis3Lines.push(`The ${i === 0 ? 'top' : rankOrdinal[i]} failed bucket for OB scan was '${b[0]}' with ${b[1]} shipments, contributing towards ${pct}% of total failures.`);
          });
          const analysis3 = analysis3Lines.join('\n');

          // ANALYSIS 4 - Top 3 Containers by Belts
          const beltRows = beltCol ? rows.filter(row => (row[beltCol] || '').trim() !== '') : [];
          const beltContainerMap = {};
          beltRows.forEach(row => {
            const container = containerCol ? (row[containerCol] || 'UNKNOWN') : 'UNKNOWN';
            const dest       = destCol       ? (row[destCol]       || '')        : '';
            if (!beltContainerMap[container]) beltContainerMap[container] = { count: 0, dests: new Set() };
            beltContainerMap[container].count++;
            if (dest) beltContainerMap[container].dests.add(dest);
          });
          const beltRanked = Object.entries(beltContainerMap).sort((a, b) => b[1].count - a[1].count).slice(0, 3);
          let analysis4Lines = [];
          beltRanked.forEach((c, i) => {
            const pct = total > 0 ? ((c[1].count / total) * 100).toFixed(1) : '0.0';
            const dest = [...c[1].dests][0] || 'Unknown';
            analysis4Lines.push(`Looking into containers that were created by the belts on site, the ${i === 0 ? 'top' : rankOrdinal[i]} container was '${c[0]}' destined for '${dest}' - ${pct}% of total OB scan misses.`);
          });
          const analysis4 = analysis4Lines.length > 0 ? analysis4Lines.join('\n') : 'No belt container data found.';

          // ANALYSIS 5 - Shipment Level Misses
          const laneMap = {};
          rows.forEach(row => {
            const dest = destCol ? (row[destCol] || '') : '';
            if (dest) laneMap[dest] = (laneMap[dest] || 0) + 1;
          });
          const topLane = Object.entries(laneMap).sort((a, b) => b[1] - a[1])[0];
          const analysis5 = `Focusing on shipment level misses, the total was ${total}. Of which, the most impacted outbound lane was '${topLane ? topLane[0] : 'Unknown'}' with ${topLane ? topLane[1] : 0} shipments.`;

          // ANALYSIS 6 - ADTA Belt
          const adtaRows = autosorterCol ? rows.filter(row => (row[autosorterCol] || '').trim() !== '' && (row[autosorterCol] || '').trim().toLowerCase() !== 'null') : [];
          const adtaCount = adtaRows.length;
          const adtaPct   = total > 0 ? ((adtaCount / total) * 100).toFixed(1) : '0.0';
          const analysis6 = `Of all OB scan misses, ${adtaCount} packages were processed through the ADTA belt (Shipping Sorter), contributing towards ${adtaPct}% of total OB scan misses.`;

          // ANALYSIS 7 - Stack Scan by Size
          const sizeMap = {};
          rows.forEach(row => {
            const bucket = bucketCol ? (row[bucketCol] || '').toUpperCase() : '';
            if (bucket.includes('STACK')) {
              const size = sizeCol ? (row[sizeCol] || 'Unknown') : 'Unknown';
              sizeMap[size] = (sizeMap[size] || 0) + 1;
            }
          });
          const sizeOrder = ['extra small','small','medium','large','extra large','nc plus','nc'];
          const sizeRanked = Object.entries(sizeMap).sort((a, b) => {
            const ai = sizeOrder.indexOf(a[0].toLowerCase());
            const bi = sizeOrder.indexOf(b[0].toLowerCase());
            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
          });
          const analysis7 = sizeRanked.length > 0
            ? sizeRanked.map(s => `Of all the shipments missing stack scan, ${s[1]} were '${s[0]}'.`).join('\n')
            : 'No stack scan size data found.';

          // Root Causes
          const rootCauses = [
            `SWA vs AFN Pattern: The vast majority of sortation misses (${afnPct}%) originate from AFN nodes, suggesting AFN inbound container management is the primary driver of sort failures. SWA nodes contribute a smaller but notable ${swaPct}%, indicating room for improvement across both network types.`,
            xdRanked.length > 0 ? `Top XD Failures: ${xdRanked[0][0]} alone accounts for ${total > 0 ? ((xdRanked[0][1].count / total) * 100).toFixed(1) : 0}% of all OB scan misses, indicating a systemic departure scanning issue${[...xdRanked[0][1].origins][0] ? ' at ' + [...xdRanked[0][1].origins][0] : ''}. The concentration of XD failures on specific lanes suggests a lane-specific process breakdown.` : 'No XD failure data available.',
            bucketRanked.length > 0 ? `Top Sort Failure Buckets: ${bucketRanked[0][0]} is the dominant failure bucket at ${total > 0 ? ((bucketRanked[0][1] / total) * 100).toFixed(1) : 0}% of failures, indicating systemic issues with the stack scanning process that require immediate operational attention.` : 'No bucket data available.'
          ];

          // Corrective Actions
          const correctiveActions = [
            `SWA/AFN Actions: Implement targeted process audits at AFN origin nodes to address the disproportionate ${afnPct}% contribution to sortation misses. Coordinate with FC operations teams to improve container departure scanning compliance before dispatch to SXW2.`,
            xdRanked.length > 0 ? `XD Improvements: Deploy immediate investigation into ${xdRanked[0][0]}${[...xdRanked[0][1].origins][0] ? ' from ' + [...xdRanked[0][1].origins][0] : ''}, including equipment checks and departure scanning procedure reviews. Implement real-time alerts for containers with repeated scan failures on high-volume lanes.` : 'Review XD container departure procedures across all origin nodes.',
            `Sort Process Improvements: Conduct urgent process audit for ${bucketRanked.length > 0 ? bucketRanked[0][0] : 'stack scan'} failures, ensuring all associates are trained on correct stacking scan procedures. Review ADTA belt operations and implement additional compliance checkpoints for packages processed through the Shipping Sorter.`
          ];

          const isGreen = complianceVal >= 99.2;
          const statusText = isGreen ? 'GREEN 🟢' : 'RED 🔴';
          const statusBg    = isGreen ? '#E5FFE5' : '#FFE5E5';
          const statusColor = isGreen ? '#166534' : '#991b1b';
          const rankEmoji   = ['🔴', '🟠', '🟡'];

          // OUTPUT 1 - PLAIN TEXT
          const plainText = `Outbound Scan Compliance
XDOCK FAILURE (CURRENT NODE - UNTRACEABLE): The package has been departed as untraceable from the SC.
XDOCK FAILURE (CURRENT NODE - DEPART SCAN): The package arrived in a XDock container and this IB container has not been departed. The package has not been scanned at shipment-level, either.
XDOCK FAILURE (CURRENT NODE - BAG STACK SCAN): The package arrives to the site within a bag. However, the bag is not scanned to any container (pallet, cart, shuttle) and this prevents it from being correctly departed.
XDOCK FAILURE (CURRENT NODE - AUTODEPART): The package arrived in a XDock container and this IB container has not been departed. The package has not been scanned at shipment-level, either. The package has reached the next node, thus triggering auto-depart.
SORT FAILURE (CURRENT NODE - UNTRACEABLE): The package has been departed as untraceable from the SC.
SORT FAILURE (CURRENT NODE - SWEEP): The package has been swept in the SC.
SORT FAILURE (CURRENT NODE - SUSPECT MERGE): The package has not been departed in a standard way, as the OB container has been merged to another, with the second container resulting in an unrealistic excessive fill rate after the merge. This suggests the merge was only virtual and not physical.
SORT FAILURE (CURRENT NODE - STACK SCAN): The package is missing the expected stacking scan.
SORT FAILURE (CURRENT NODE - STACK SCAN / FAILED MOVE): The package is missing the expected stacking scan. The root-cause is a failed move of the same package, not corrected.

Targets: Red: <99.2% Green: 99.2%-100%

**COMPLIANCE STATUS: ${complianceVal}% - ${statusText}**

Source - w.amazon.com/bin/view/ATSEU/APP/Reporting/QS_OB_Scan_Compliance_Dashboard/

Buckets
${analysis1}

XD Failures
${analysis2}

Sort Misses
${analysis3}
${analysis4}
${analysis5}
${analysis6}

Stack Scan Misses by Size
${analysis7}

Root Causes
${rootCauses.map((r, i) => `${i+1}. ${r}`).join('\n')}

Corrective Actions
${correctiveActions.map((r, i) => `${i+1}. ${r}`).join('\n')}`;

          document.getElementById('plainTextOutput').textContent = plainText;

          // OUTPUT 2 - HTML REPORT
          const xdTableRows = xdRanked.map((c, i) => {
            const pct    = total > 0 ? ((c[1].count / total) * 100).toFixed(1) : '0.0';
            const origin = [...c[1].origins][0] || 'Unknown';
            const dest   = [...c[1].dests][0]   || 'Unknown';
            const bg     = i % 2 === 0 ? '#ffffff' : '#CCFBF1';
            return `<tr style="background:${bg}">
              <td style="padding:10px 14px;font-weight:700">${rankEmoji[i]} #${i+1}</td>
              <td style="padding:10px 14px;font-weight:700;font-size:12px">${c[0]}</td>
              <td style="padding:10px 14px;text-align:center">${c[1].count}</td>
              <td style="padding:10px 14px;text-align:center;font-weight:700">${pct}%</td>
              <td style="padding:10px 14px">${origin}</td>
