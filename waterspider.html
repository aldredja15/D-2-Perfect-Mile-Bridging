<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waterspider Compliance - D2 Perfect Mile Bridging</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px;
    }
    .page-header { text-align: center; margin-bottom: 32px; color: white; }
    .page-header h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: rgba(255,255,255,0.55); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); color: white;
      border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px;
      border-radius: 8px; font-size: 13px; cursor: pointer;
      text-decoration: none; margin-bottom: 24px; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.18); }
    .card {
      background: white; border-radius: 20px; padding: 36px 40px;
      width: 100%; max-width: 680px; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .card-title { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .card-title .icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #6B46C1, #8B5CF6);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px;
      box-shadow: 0 4px 15px rgba(107,70,193,0.4);
    }
    .card-title h2 { font-size: 20px; font-weight: 800; color: #1e293b; }
    .card-title p { font-size: 13px; color: #94a3b8; margin-top: 2px; }
    .form-group { margin-bottom: 22px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-group input[type="number"],
    .form-group input[type="text"] {
      width: 100%; padding: 12px 16px;
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 14px; color: #1e293b;
      outline: none; transition: all 0.2s;
    }
    .form-group input:focus {
      border-color: #6B46C1;
      box-shadow: 0 0 0 3px rgba(107,70,193,0.15);
      background: white;
    }
    .upload-area {
      border: 2px dashed #e2e8f0; border-radius: 12px;
      padding: 32px; text-align: center; cursor: pointer;
      transition: all 0.2s; background: #f8fafc; position: relative;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #6B46C1; background: #F5F3FF; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-area h3 { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .upload-area p { font-size: 13px; color: #94a3b8; }
    .file-selected { margin-top: 10px; font-size: 13px; color: #16a34a; font-weight: 600; }
    .analyse-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6B46C1, #8B5CF6);
      color: white; font-size: 15px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      letter-spacing: 0.5px; margin-top: 8px; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(107,70,193,0.35);
    }
    .analyse-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(107,70,193,0.45); }
    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      border-radius: 10px; padding: 12px 16px; font-size: 13px;
      margin-top: 16px; display: none;
    }
    .output-section { width: 100%; max-width: 860px; margin-top: 32px; display: none; }
    .output-tabs { display: flex; gap: 8px; margin-bottom: 0; }
    .tab-btn {
      padding: 10px 22px; border-radius: 10px 10px 0 0;
      border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6);
    }
    .tab-btn.active { background: white; color: #1e293b; }
    .tab-content { background: white; border-radius: 0 16px 16px 16px; padding: 32px; display: none; }
    .tab-content.active { display: block; }
    .plain-text-output {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 20px; font-family: 'Courier New', monospace; font-size: 13px;
      line-height: 1.8; color: #1e293b; white-space: pre-wrap; word-break: break-word;
    }
    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e293b; color: white; border: none;
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-bottom: 14px; transition: background 0.2s;
    }
    .copy-btn:hover { background: #334155; }
    .download-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #6B46C1, #8B5CF6);
      color: white; border: none; padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      margin-bottom: 14px; margin-left: 8px; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(107,70,193,0.3);
    }
    .download-btn:hover { transform: translateY(-1px); }
    .report-preview { border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    iframe { width: 100%; height: 700px; border: none; }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Back to Homepage</a>

  <div class="page-header">
    <h1>🟣 Waterspider Compliance</h1>
    <p>Upload your ACES CSV export to generate your compliance bridge report</p>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="icon">🕷️</div>
      <div>
        <h2>Waterspider Compliance Flow</h2>
        <p>Automated analysis of waterspider process failures</p>
      </div>
    </div>

    <div class="form-group">
      <label>Compliance Percentage (%)</label>
      <input type="number" id="complianceInput" placeholder="e.g. 96.74" min="0" max="100" step="0.01"/>
    </div>

    <div class="form-group">
      <label>Report Date</label>
      <input type="text" id="reportDate" placeholder="e.g. April 18, 2026"/>
    </div>

    <div class="form-group">
      <label>Upload ACES Waterspider CSV File</label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="csvFile" accept=".csv"/>
        <div class="upload-icon">📂</div>
        <h3>Drop your CSV file here</h3>
        <p>or click to browse</p>
        <div class="file-selected" id="fileSelectedMsg"></div>
      </div>
    </div>

    <button class="analyse-btn" id="analyseBtn" onclick="runAnalysis()">
      🔍 Analyse &amp; Generate Report
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="output-section" id="outputSection">
    <div class="output-tabs">
      <button class="tab-btn active" onclick="switchTab('plaintext', event)">📄 Plain Text Report</button>
      <button class="tab-btn" onclick="switchTab('html', event)">🎨 HTML Report</button>
    </div>
    <div class="tab-content active" id="tab-plaintext">
      <button class="copy-btn" onclick="copyPlainText()">📋 Copy to Clipboard</button>
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="plain-text-output" id="plainTextOutput"></div>
    </div>
    <div class="tab-content" id="tab-html">
      <button class="download-btn" onclick="downloadHTML()">⬇️ Download HTML Report</button>
      <div class="report-preview">
        <iframe id="htmlPreview"></iframe>
      </div>
    </div>
  </div>

  <script>
    let generatedHTML = '';

    const csvFile = document.getElementById('csvFile');
    const uploadArea = document.getElementById('uploadArea');
    const fileMsg = document.getElementById('fileSelectedMsg');

    csvFile.addEventListener('change', function() {
      if (this.files[0]) fileMsg.textContent = '✅ ' + this.files[0].name + ' selected';
    });
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault(); uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) {
        csvFile.files = e.dataTransfer.files;
        fileMsg.textContent = '✅ ' + file.name + ' selected';
      }
    });

    function switchTab(tab, event) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (event && event.target) event.target.classList.add('active');
    }

    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
    function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

    function parseCSVLine(line) {
      const result = []; let current = ''; let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
        else { current += ch; }
      }
      result.push(current);
      return result;
    }

    function parseCSV(text) {
      text = text.replace(/^\uFEFF/, '');
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) return { headers: [], rows: [] };
      const rawHeaders = parseCSVLine(lines[0]);
      const headers = rawHeaders.map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        if (vals.length < 2) continue;
        const row = {};
        headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
        rows.push(row);
      }
      return { headers, rows };
    }

    function isOne(val) {
      return val === '1' || val === 1 || val === 'true' || val === 'TRUE' || val === 'Y' || val === 'y';
    }

    function isBlank(v) { return !v || v.trim() === '' || v.trim().toLowerCase() === 'null'; }

    function runAnalysis() {
      hideError();
      const complianceVal = parseFloat(document.getElementById('complianceInput').value);
      const reportDate = document.getElementById('reportDate').value.trim() ||
        new Date().toLocaleDateString('en-GB', {year:'numeric', month:'long', day:'numeric'});
      const file = csvFile.files[0];

      if (isNaN(complianceVal)) { showError('Please enter a compliance percentage.'); return; }
      if (!file) { showError('Please upload a CSV file.'); return; }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const { headers, rows } = parseCSV(e.target.result);
          if (rows.length === 0) { showError('No data found in CSV file.'); return; }

          const total = rows.length;

          // ── ANALYSIS 1: Failure Buckets ──
          // Uses flag columns: delayed_print_flag, multiple_aa_flag, delayed_staging_flag
          // Value of 1 = failed for that bucket
          // A single container can fail multiple buckets so count each independently

          const delayedPrint   = rows.filter(r => isOne(r['delayed_print_flag'])).length;
          const multipleAA     = rows.filter(r => isOne(r['multiple_aa_flag'])).length;
          const delayedStaging = rows.filter(r => isOne(r['delayed_staging_flag'])).length;

          // Total failed containers = rows where ANY flag is 1
          const failedRows = rows.filter(r =>
            isOne(r['delayed_print_flag']) ||
            isOne(r['multiple_aa_flag'])   ||
            isOne(r['delayed_staging_flag'])
          );
          const totalFailed = failedRows.length || total;

          const dpPct  = ((delayedPrint   / totalFailed) * 100).toFixed(2);
          const maaPct = ((multipleAA     / totalFailed) * 100).toFixed(2);
          const dsPct  = ((delayedStaging / totalFailed) * 100).toFixed(2);

          const analysis1 = `The sum of containers with a delayed print was ${delayedPrint}, contributing towards ${dpPct}% of failed buckets. The sum of containers with multiple AA handling was ${multipleAA}, contributing towards ${maaPct}% of failed buckets. The sum of containers with delayed staging was ${delayedStaging}, contributing towards ${dsPct}% of failed buckets.`;

          // ── ANALYSIS 2: Top Offending Associate ──
          // closed_by = the associate who closed the container
          // Count how many failed containers each associate closed
          const assocMap = {};
          failedRows.forEach(row => {
            const assoc = (row['closed_by'] || '').trim();
            if (assoc && assoc !== '') {
              assocMap[assoc] = (assocMap[assoc] || 0) + 1;
            }
          });

          const assocRanked = Object.entries(assocMap).sort((a, b) => b[1] - a[1]);
          let analysis2 = 'No associate data found.';
          if (assocRanked.length > 0) {
            const topCount = assocRanked[0][1];
            const topPct   = ((topCount / totalFailed) * 100).toFixed(2);
            analysis2 = `The top offending associate who began the process by closing containers but did not complete the process correctly was responsible for ${topCount} containers, contributing towards ${topPct}% of total failed containers. (Associate name withheld to protect confidentiality)`;
          }

          // ── ANALYSIS 3: Top 3 Outbound Lanes ──
          // ob_ssp_lane column - count failed containers per lane
          const laneMap = {};
          failedRows.forEach(row => {
            const lane = (row['ob_ssp_lane'] || '').trim();
            if (lane && lane !== '') laneMap[lane] = (laneMap[lane] || 0) + 1;
          });

          const laneRanked = Object.entries(laneMap).sort((a, b) => b[1] - a[1]).slice(0, 3);
          const rankLabels = ['first', 'second', 'third'];
          let analysis3Lines = [];
          laneRanked.forEach((l, i) => {
            const pct = ((l[1] / totalFailed) * 100).toFixed(2);
            analysis3Lines.push(`The${i === 0 ? '' : ' ' + rankLabels[i]} outbound lane with the most failures was '${l[0]}' contributing towards ${pct}%.`);
          });
          const analysis3 = analysis3Lines.join('\n');

          // ── Root Causes ──
          const rootCauses = [
            `Bucket Distribution Pattern: Delayed print failures dominate at ${dpPct}% of all failures, indicating systemic issues with label printing processes occurring almost immediately after container closure. Multiple AA handling affects ${maaPct}% of failures, suggesting inadequate process ownership and handoff confusion during the close-print-stage sequence.`,
            assocRanked.length > 0
              ? `Top Offending Associate: One associate is responsible for ${((assocRanked[0][1] / totalFailed) * 100).toFixed(0)}% of all failures, indicating either inadequate training, unclear standard work, or potential workload pressures causing shortcuts in the complete close-stage workflow.`
              : 'No associate data available for root cause analysis.',
            laneRanked.length > 0
              ? `Top Outbound Lanes: The ${laneRanked[0][0]} lane accounts for ${((laneRanked[0][1] / totalFailed) * 100).toFixed(2)}% of all failures${laneRanked.length > 1 ? ', followed by ' + laneRanked[1][0] + ' (' + ((laneRanked[1][1] / totalFailed) * 100).toFixed(2) + '%)' : ''}, suggesting these lanes may have unique operational challenges or staffing issues.`
              : 'No lane data available.'
          ];

          // ── Corrective Actions ──
          const correctiveActions = [
            `Bucket-Specific Actions: Implement immediate printer availability checks and proximity mapping to ensure AAs can print within the 4-minute window. Enforce single-AA container ownership through visual management and eliminate mid-process handoffs unless operationally critical.`,
            `Associate Coaching/Retraining: Conduct focused one-on-one coaching sessions with the top offending associate to identify root causes (workload, understanding, tool access). Reinforce the complete close-print-stage workflow through hands-on re-certification and peer mentoring.`,
            laneRanked.length > 0
              ? `Lane-Specific Improvements: Audit ${laneRanked.map(l => l[0]).join(', ')} lane${laneRanked.length > 1 ? 's' : ''} for infrastructure bottlenecks (printer placement, staging area distance, cart availability). Consider dedicated waterspider assignments during peak hours and implement real-time compliance monitoring for these lanes.`
              : 'Review all lane operations for compliance gaps.'
          ];

          const isGreen     = complianceVal >= 96;
          const statusText  = isGreen ? 'GREEN 🟢' : 'RED 🔴';
          const statusBg    = isGreen ? '#E5FFE5' : '#FFE5E5';
          const statusColor = isGreen ? '#166534' : '#991b1b';
          const rankEmoji   = ['🔴', '🟠', '🟡'];

          // ── OUTPUT 1: PLAIN TEXT ──
          const plainText = `Waterspider Compliance
The Waterspider Process (Container level) is said to be compliant if it follows all of the following sequence and rules:
1. Sequence: Close container - Staging lane OR Close container - General area AND
2. Container Label is printed within 4 minutes from closing and staged within 10 mins from closing AND
3. Only one AA was involved in closing, printing and staging the container (staging to GA or SL) AND
4. The container was not force moved

Targets: Red: <96% Green: 96%-100%

**COMPLIANCE STATUS: ${complianceVal}% - ${statusText}**

Source - w.amazon.com/bin/view/ATSEU/NMT/DnA/Products/ACES-Process-Compliance-Data/

Buckets
${analysis1}

Top Offending Associate
${analysis2}

Outbound Lane
${analysis3}

Root Causes
${rootCauses.map((r, i) => `${i+1}. ${r}`).join('\n')}

Corrective Actions
${correctiveActions.map((r, i) => `${i+1}. ${r}`).join('\n')}`;

          document.getElementById('plainTextOutput').textContent = plainText;

          // ── OUTPUT 2: HTML REPORT ──
          const laneTableRows = laneRanked.map((l, i) => {
            const pct = ((l[1] / totalFailed) * 100).toFixed(2);
            const bg  = i % 2 === 0 ? '#ffffff' : '#F3E8FF';
            return `<tr style="background:${bg}">
              <td style="padding:10px 14px;font-weight:700">${rankEmoji[i]} #${i+1}</td>
              <td style="padding:10px 14px;font-weight:700">${l[0]}</td>
              <td style="padding:10px 14px;text-align:center">${l[1]}</td>
              <td style="padding:10px 14px;text-align:center;font-weight:700">${pct}%</td>
            </tr>`;
          }).join('');

          generatedHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Waterspider Compliance Report - ${reportDate}</title>
</head>
<body style="margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5;">

  <div style="background:#6B46C1;padding:28px 40px;text-align:center;">
    <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:800;">Waterspider Compliance Report</h1>
    <p style="margin:8px 0 0;color:rgba(255,255,255,0.85);font-size:14px;">Report Date: ${reportDate} &nbsp;|&nbsp; Target: Red &lt;96% &nbsp;|&nbsp; Green 96%-100% &nbsp;|&nbsp; Total Containers Analysed: ${total}</p>
  </div>

  <div style="max-width:860px;margin:0 auto;padding:32px 20px;">

    <div style="background:${statusBg};border-radius:16px;padding:28px;text-align:center;margin-bottom:28px;border:2px solid ${isGreen ? '#86efac' : '#fca5a5'};">
      <div style="font-size:36px;font-weight:900;color:${statusColor};">${complianceVal}% - ${statusText}</div>
    </div>

    <div style="background:#E9D5FF;border-left:4px solid #6B46C1;border-radius:12px;padding:22px 26px;margin-bottom:28px;">
      <h2 style="color:#4c1d95;font-size:16px;margin:0 0 10px;">📋 Process Compliance Definition</h2>
      <p style="color:#5b21b6;font-size:14px;line-height:1.7;margin:0 0 8px;">The Waterspider Process (Container level) is compliant if it follows the correct sequence, timing, ownership and movement rules.</p>
      <p style="color:#5b21b6;font-size:13px;margin:0;"><strong>Source:</strong> w.amazon.com/bin/view/ATSEU/NMT/DnA/Products/ACES-Process-Compliance-Data/</p>
    </div>

    <h2 style="font-size:17px;color:#1e293b;margin:0 0 16px;font-weight:800;">Failure Analysis by Bucket</h2>
    <p style="font-size:13px;color:#64748b;margin-bottom:16px;">Total failed containers: <strong>${totalFailed}</strong> out of ${total} analysed. A container can contribute to multiple buckets.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;">
      <div style="background:#E9D5FF;border-radius:12px;padding:20px;text-align:center;border:1px solid #8B5CF6;">
        <div style="font-size:12px;color:#5b21b6;font-weight:700;margin-bottom:6px;">🖨️ Delayed Print</div>
        <div style="font-size:28px;font-weight:900;color:#6B46C1;">${delayedPrint}</div>
        <div style="font-size:12px;color:#7c3aed;margin-top:4px;">${dpPct}% of Failed Buckets</div>
      </div>
      <div style="background:#F3E8FF;border-radius:12px;padding:20px;text-align:center;border:1px solid #8B5CF6;">
        <div style="font-size:12px;color:#5b21b6;font-weight:700;margin-bottom:6px;">👥 Multiple AA Handling</div>
        <div style="font-size:28px;font-weight:900;color:#6B46C1;">${multipleAA}</div>
        <div style="font-size:12px;color:#7c3aed;margin-top:4px;">${maaPct}% of Failed Buckets</div>
      </div>
      <div style="background:#E9D5FF;border-radius:12px;padding:20px;text-align:center;border:1px solid #8B5CF6;">
        <div style="font-size:12px;color:#5b21b6;font-weight:700;margin-bottom:6px;">⏰ Delayed Staging</div>
        <div style="font-size:28px;font-weight:900;color:#6B46C1;">${delayedStaging}</div>
        <div style="font-size:12px;color:#7c3aed;margin-top:4px;">${dsPct}% of Failed Buckets</div>
      </div>
    </div>
    <p style="font-size:14px;color:#475569;margin-bottom:28px;">${analysis1}</p>

    <h2 style="font-size:17px;color:#1e293b;margin:0 0 16px;font-weight:800;">Top Offending Associate</h2>
    <div style="background:#E9D5FF;border:1px solid #8B5CF6;border-radius:12px;padding:22px 26px;margin-bottom:28px;">
      <div style="font-size:15px;font-weight:800;color:#4c1d95;margin-bottom:8px;">👤 Associate Analysis</div>
      <p style="font-size:14px;color:#5b21b6;line-height:1.7;margin:0 0 8px;">${analysis2}</p>
    </div>

    <h2 style="font-size:17px;color:#1e293b;margin:0 0 16px;font-weight:800;">Top 3 Outbound Lanes with Failures</h2>
    <div style="border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;margin-bottom:28px;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#8B5CF6;">
            <th style="padding:12px 14px;text-align:left;color:white;font-size:13px;">Rank</th>
            <th style="padding:12px 14px;text-align:left;color:white;font-size:13px;">Outbound Lane</th>
            <th style="padding:12px 14px;text-align:center;color:white;font-size:13px;">Container Count</th>
            <th style="padding:12px 14px;text-align:center;color:white;font-size:13px;">Contribution %</th>
          </tr>
        </thead>
        <tbody>${laneTableRows || '<tr><td colspan="4" style="padding:16px;text-align:center;color:#94a3b8;">No lane data found</td></tr>'}</tbody>
      </table>
    </div>

    <h2 style="font-size:17px;color:#1e293b;margin:0 0 16px;font-weight:800;">Root Causes</h2>
    <div style="background:#E9D5FF;border-left:4px solid #6B46C1;border-radius:12px;padding:22px 26px;margin-bottom:28px;">
      ${rootCauses.map((r, i) => `<div style="margin-bottom:${i < rootCauses.length-1 ? '12px':'0'};font-size:14px;color:#5b21b6;line-height:1.7;"><strong>${i+1}.</strong> ${r}</div>`).join('')}
    </div>

    <h2 style="font-size:17px;color:#1e293b;margin:0 0 16px;font-weight:800;">Corrective Actions</h2>

    <div style="text-align:center;font-size:12px;color:#94a3b8;padding-top:20px;border-top:1px solid #e2e8f0;">

        } catch(err) {
          showError('Error analysing CSV: ' + err.message);
          console.error(err);
        }
      };
      reader.readAsText(file);
    }

    function copyPlainText() {
      const text = document.getElementById('plainTextOutput').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 2000);
      });
    }

    function downloadHTML() {
      if (!generatedHTML) return;
      const blob = new Blob([generatedHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Waterspider_Compliance_Report.html';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
